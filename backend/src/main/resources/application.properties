# ===============================
# 🚀 APP
# ===============================
spring.application.name=finbrain-backend
server.port=8080

# ===============================
# 🐘 DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/finbrain
spring.datasource.username=postgres
spring.datasource.password=luiz
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# 🧠 JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# 📊 LOGS
# ===============================
logging.level.org.springframework.security=DEBUG
logging.level.com.finbrain.backend=DEBUG

# ===============================
# 📧 EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# 🔐 JWT
# ===============================
jwt.secret=finbrain-super-secret-key-12345678901234567890
jwt.expiration=86400000

# ===============================
# ⚠️ ERROS
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always